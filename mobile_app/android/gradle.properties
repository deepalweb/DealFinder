org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Djava.net.preferIPv4Stack=true -Djava.net.preferIPv6Addresses=false
org.gradle.daemon=false
kotlin.compiler.execution.strategy=in-process
android.useAndroidX=true
android.enableJetifier=true

# Optional fallback: required for embedded Google Maps on Android if you do
# not supply the key through android/local.properties or CI environment vars.
# GOOGLE_MAPS_API_KEY=your-google-maps-api-key
