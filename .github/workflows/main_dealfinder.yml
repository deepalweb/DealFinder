name: Build and Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install Next.js dependencies
        working-directory: ./frontend-next
        run: npm ci --legacy-peer-deps

      - name: Build Next.js
        working-directory: ./frontend-next
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://dealfinderlk-eafsbyd7ghaph0az.southindia-01.azurewebsites.net/api
          NODE_ENV: production

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci --omit=dev

      - name: Build deployment package
        run: |
          # Create deploy structure
          mkdir -p deploy/frontend-next/frontend-next

          # Copy backend
          cp -r backend deploy/backend

          # Copy standalone output
          cp -r frontend-next/.next/standalone/. deploy/frontend-next/

          # Copy static assets to the correct location
          mkdir -p deploy/frontend-next/frontend-next/.next/static
          cp -r frontend-next/.next/static/. deploy/frontend-next/frontend-next/.next/static/

          # Copy public folder if exists
          if [ -d "frontend-next/public" ] && [ "$(ls -A frontend-next/public 2>/dev/null)" ]; then
            mkdir -p deploy/frontend-next/frontend-next/public
            cp -r frontend-next/public/. deploy/frontend-next/frontend-next/public/
          fi

          # Root files
          cp package.json deploy/
          cp web.config deploy/
          cp .deployment deploy/

          echo "=== Deploy structure ==="
          echo "Root:"
          ls -la deploy/
          echo ""
          echo "Frontend-next root:"
          ls -la deploy/frontend-next/
          echo ""
          echo "Frontend-next/frontend-next:"
          ls -la deploy/frontend-next/frontend-next/
          echo ""
          echo "Static files:"
          ls -la deploy/frontend-next/frontend-next/.next/static/ || echo "No static folder"
          echo ""
          echo "Public files:"
          ls -la deploy/frontend-next/frontend-next/public/ || echo "No public folder"

      - name: Zip deployment package
        run: |
          python <<'PY'
          from pathlib import Path
          import zipfile

          deploy_dir = Path('deploy')
          with zipfile.ZipFile('deploy.zip', 'w', compression=zipfile.ZIP_DEFLATED) as archive:
              for path in deploy_dir.rglob('*'):
                  archive.write(path, path.relative_to(deploy_dir))
          PY

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'dealfinderlk'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_LINUX }}
          package: ./deploy.zip
