name: Build and Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      # Install backend dependencies
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      # Install and build Next.js
      - name: Install Next.js dependencies
        working-directory: ./frontend-next
        run: npm ci

      - name: Build Next.js app
        working-directory: ./frontend-next
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://dealfinder-h0hnh3emahabaahw.southindia-01.azurewebsites.net/api
          NODE_ENV: production

      # Copy Next.js static assets into standalone output
      - name: Copy Next.js static assets
        run: |
          cp -r frontend-next/.next/static frontend-next/.next/standalone/frontend-next/.next/static || true
          cp -r frontend-next/public frontend-next/.next/standalone/frontend-next/public || true

      # Deploy to Azure Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'dealfinder'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_DAE04F5DFEC143DDBD5202A1353AA7D8 }}
          package: .
