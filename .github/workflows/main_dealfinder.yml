name: Build and Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      # Build Next.js
      - name: Install Next.js dependencies
        working-directory: ./frontend-next
        run: npm ci

      - name: Build Next.js
        working-directory: ./frontend-next
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://dealfinder-h0hnh3emahabaahw.southindia-01.azurewebsites.net/api
          NODE_ENV: production

      # Install backend dependencies
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci --omit=dev

      # Build deployment package
      - name: Build deployment package
        run: |
          mkdir -p deploy

          # 1. Copy backend
          cp -r backend deploy/backend

          # 2. Flatten Next.js standalone output to deploy/frontend-next/
          #    standalone output is at frontend-next/.next/standalone/
          #    which contains: server.js, node_modules/, frontend-next/ subfolder
          mkdir -p deploy/frontend-next
          cp -r frontend-next/.next/standalone/. deploy/frontend-next/
          # Copy static assets
          cp -r frontend-next/.next/static deploy/frontend-next/.next/static
          cp -r frontend-next/public deploy/frontend-next/public

          # 3. Root files
          cp package.json deploy/
          cp web.config deploy/
          cp .deployment deploy/

          echo "=== Deploy structure ==="
          ls deploy/
          echo "=== frontend-next ==="
          ls deploy/frontend-next/

      # Zip and deploy
      - name: Zip deployment package
        run: cd deploy && zip -r ../deploy.zip .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'dealfinder'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_DAE04F5DFEC143DDBD5202A1353AA7D8 }}
          package: ./deploy.zip
